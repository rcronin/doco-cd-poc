# Docker Swarm stack: Traefik + Time API
# Follows https://doc.traefik.io/traefik/setup/swarm/

services:
  traefik:
    image: traefik:v3.6
    networks:
      - traefik_proxy
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./dynamic:/dynamic:ro
    command:
      # HTTP entrypoint
      - "--entrypoints.web.address=:80"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Dynamic TLS config
      - "--providers.file.filename=/dynamic/tls.yaml"
      # Swarm provider (per docs: use Swarm, not Docker)
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=doco-cd-poc_traefik_proxy"
      # API & dashboard (secure, no insecure mode)
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        # Dashboard router (Host-based, per docs)
        - "traefik.http.routers.dashboard.rule=Host(`dashboard.swarm.localhost`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.tls=true"
        # Basic-auth for dashboard
        - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$H6uskkkW$$k5SHPJcPnh.B9djLydFJx."
        - "traefik.http.routers.dashboard.middlewares=dashboard-auth@swarm"
        # Swarm port hint (per docs)
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  api:
    image: time-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    networks:
      - traefik_proxy
    deploy:
      mode: replicated
      replicas: 2
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`api.swarm.localhost`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls=true"
        - "traefik.http.services.api.loadbalancer.server.port=3000"
        - "traefik.http.services.api.loadbalancer.passhostheader=true"
    environment:
      - NODE_ENV=production
      - PORT=3000

networks:
  traefik_proxy:
    driver: overlay
    attachable: true
